---
# Ansible Inventory
# 
# Structure:
#   all:
#     children:
#       group_name:
#         hosts:
#           hostname:
#             ansible_host: IP
#             custom_var: value

all:
  vars:
    # Global defaults
    ansible_python_interpreter: /usr/bin/python3
    timezone: <your/Timezone>
    deploy_user: deployuser
    
  children:
    # === VPS Servers ===
    vps:
      hosts:
        # Example: server-a (replace with your host details)
        server-a:
          ansible_host: 203.0.113.10
          ansible_user: deployuser
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519_server_a
          
        # Example: server-b
        server-b:
          ansible_host: 203.0.113.11
          ansible_user: deployuser
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519_server_b
          
        # New server template (uncomment and modify)
        # newserver:
        #   ansible_host: 1.2.3.4
        #   ansible_user: root
        #   ansible_ssh_pass: "{{ vault_newserver_password }}"
        #   deploy_ssh_pubkey: "ssh-ed25519 AAAA..."
    
    # === OpenClaw Instances ===
    openclaw:
      hosts:
        # Servers that run/will run OpenClaw
        # server-c:
        #   ansible_host: 203.0.113.12
        #   ansible_user: root  # Initial setup
        #   ansible_ssh_pass: "{{ vault_server_c_password }}"
        #   deploy_ssh_pubkey: "ssh-ed25519 AAAA... deployuser@hostname"
      vars:
        nodejs_version: "22"
        openclaw_version: "latest"
    
    # === By Environment ===
    production:
      hosts:
        server-a:
        server-b:
    
    staging:
      hosts: {}
