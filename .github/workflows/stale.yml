name: Stale issues and PRs

on:
  schedule:
    - cron: "0 9 * * 1"  # Every Monday at 09:00 UTC
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: stale
          stale-issue-message: >
            This issue has been open for 60 days with no activity. It will be
            closed in 14 days if there is no further activity. If this is still
            relevant, leave a comment or remove the stale label.
          close-issue-message: >
            Closing due to inactivity. Feel free to reopen if the issue is
            still relevant.

          # Pull requests
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-label: stale
          stale-pr-message: >
            This pull request has been open for 30 days with no activity. It
            will be closed in 14 days if there is no further activity. If this
            is still in progress, leave a comment or remove the stale label.
          close-pr-message: >
            Closing due to inactivity. Feel free to reopen or open a new PR.

          # Do not mark these as stale
          exempt-issue-labels: "pinned,security,in-progress"
          exempt-pr-labels: "pinned,security,in-progress"
